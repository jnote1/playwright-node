version: 2
updates:
  # Monitor Docker images for updates
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    commit-message:
      prefix: "chore: "
      prefix-scope: "deps"
    reviewers:
      - "jnote"
